<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Jurist Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        .hero-section { padding: 60px 0; background: #f8f9fa; border-bottom: 1px solid #dee2e6; }
        .dark-mode { background-color: #121212; color: white; }
        .dark-mode .hero-section { background: #1e1e1e; border-color: #333; }
        .card { margin-top: 20px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">⚖️ Juridisk AI-Portal</a>
            <button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">Bytt Tema</button>
        </div>
    </nav>

    <div class="hero-section text-center">
        <div class="container">
            <h1 class="display-4">Fremtidens juridiske verktøy</h1>
            <p class="lead">Eksperimentering med AI, PDF-analyse og automatisering.</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Dokumentanalyse</h5>
                        <p class="card-text">Vår Python-drevne motor skanner kontrakter for risiko.</p>
                        <a href="#" class="btn btn-primary">Prøv Demo</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            console.log("Tema ble endret!");
        }
    </script>

</body>
</html>
