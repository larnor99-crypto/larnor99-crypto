<!DOCTYPE html>
<html lang="no">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Jurist Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand">⚖️ Juridisk AI-Portal</span>
            <button class="btn btn-outline-light btn-sm" onclick="toggleDarkMode()">Bytt Tema</button>
        </div>
    </nav>

    <div class="container mt-3 text-end">
        <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('apiSection').classList.toggle('d-none')">
            <i class="fas fa-cog"></i> Innstillinger
        </button>
        <div id="apiSection" class="d-none mt-2">
            <div class="card card-body shadow-sm d-inline-block" style="max-width: 300px;">
                <input type="password" id="userApiKey" class="form-control form-control-sm mb-2" placeholder="Lim inn Gemini API-nøkkel">
                <button class="btn btn-sm btn-primary w-100" onclick="saveKey()">Lagre lokalt</button>
            </div>
        </div>
    </div>

    <div class="hero-section text-center py-5">
        <div class="container">
            <h1>Velkommen til din Portal</h1>
            <p class="lead">Verktøy for moderne juridisk arbeid.</p>
            <a href="http://4.180.183.244:8501" target="_blank" class="btn btn-success btn-lg">🚀 Åpne AI-Analysator (Streamlit)</a>
        </div>
    </div>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="calc-box shadow p-4 border rounded bg-white">
                    <h4>Kalkulator: Oppsigelsestid</h4>
                    <p class="small text-muted">Beregner sluttdato (3 mnd frist fra månedsslutt).</p>
                    <label>Oppsigelse levert i dag:</label>
                    <input type="date" id="oppsigelsesDato" class="form-control mb-3">
                    <button class="btn btn-primary w-100" onclick="beregnSlutt()">Beregn Sluttdato</button>
                    <div id="resultat" class="mt-3 fw-bold text-primary"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="calc-box shadow p-4 border rounded bg-white">
                    <h4><i class="fas fa-robot"></i> Spør AI-juristen</h4>
                    <p class="small text-muted">Støttes av Google Gemini 1.5 Flash</p>
                    <textarea id="aiInput" class="form-control mb-3" rows="4" placeholder="Hva kan jeg hjelpe deg med?"></textarea>
                    <button class="btn btn-dark w-100" onclick="askAI()">Send spørsmål</button>
                    <div id="aiResponse" class="mt-4 p-3 border rounded bg-light d-none" style="white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
